<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — BKP Homes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="navbar">BKP Homes</div>

  <div class="admin-wrap">
    <div id="login-panel" class="admin-panel admin-card">
      <h2>Admin Login</h2>
      <div class="form-grid login-grid">
        <input id="admin-username" placeholder="Username" />
        <input id="admin-password" type="password" placeholder="Password" />
        <button id="login-button">Login</button>
      </div>
      <p id="login-error" class="error-message"></p>
    </div>

    <div id="dashboard-panel" class="admin-panel admin-card" style="display:none;">
      <div class="admin-header">
        <h2>Product Manager</h2>
        <button class="secondary-btn" id="logout-button">Logout</button>
      </div>
      <div class="form-grid">
        <input id="name" placeholder="Name" />
        <input id="price" placeholder="Price" type="number" step="0.01" />
        <input id="category" placeholder="Category" />
        <input id="material" placeholder="Material" />
        <input id="size" placeholder="Size" />
        <input id="image_file" type="file" accept="image/*" />
        <input id="image" placeholder="Image URL (optional fallback)" />
        <textarea id="desc" placeholder="Description"></textarea>
        <button id="add-button">Add Product</button>
      </div>
      <div class="admin-list">
        <h3>Existing Products</h3>
        <div id="product-list"></div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
